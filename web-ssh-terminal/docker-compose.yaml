services:
  robot-1:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: test-robot-1
    ports:
      - "2222:2222"
    environment:
      - PUID=1000
      - PGID=1000
      - PASSWORD_ACCESS=true
      - USER_PASSWORD=testpass
      - USER_NAME=ubuntu

  robot-2:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: test-robot-2
    ports:
      - "2223:2222"
    environment:
      - PUID=1000
      - PGID=1000
      - PASSWORD_ACCESS=true
      - USER_PASSWORD=testpass
      - USER_NAME=ubuntu
